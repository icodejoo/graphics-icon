[package]
name = "colrv1-writer"
version = "0.0.0"
edition = "2021"
description = "Thin wasm writer: paint-tree JSON + base SFNT -> SFNT with COLRv1 + CPAL (via fontations write-fonts)."
license = "MIT OR Apache-2.0"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
read-fonts = "0.31"
write-fonts = "0.39"

# 减小 wasm 体积
[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
panic = "abort"
